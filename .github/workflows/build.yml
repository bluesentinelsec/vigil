name: Build and Release

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: amd64
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      
      - name: Install Python dependencies
        run: pip install pexpect
      
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential \
            libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev
      
      - name: Run tests
        run: make test
      
      - name: Build binary
        run: make build
      
      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            VERSION=$(basl.exe --version | cut -d' ' -f2)
          else
            VERSION=$(./basl --version | cut -d' ' -f2)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Package binary
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            zip basl-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.VERSION }}.zip basl.exe
          else
            zip basl-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.VERSION }}.zip basl
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: basl-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.VERSION }}
          path: basl-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.VERSION }}.zip
      
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: basl-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.VERSION }}.zip
