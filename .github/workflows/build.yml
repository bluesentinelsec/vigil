name: Build

on:
  push:
  workflow_dispatch:

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -DBASL_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  integration-tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies (POSIX)
        if: runner.os != 'Windows'
        run: pip install pytest pexpect

      - name: Install test dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install pytest wexpect

      - name: Configure
        run: cmake -S . -B build -DBASL_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run integration tests (POSIX)
        if: runner.os != 'Windows'
        run: BASL_BIN=$PWD/build/basl pytest integration_tests/ -v

      - name: Run integration tests (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:BASL_BIN = "$PWD\build\Release\basl.exe"
          pytest integration_tests/ -v
        run: BASL_BIN=$PWD/build/basl pytest integration_tests/ -v

  android:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=${{ matrix.abi }}
          -DANDROID_PLATFORM=android-21
          -DBASL_BUILD_TESTS=OFF
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_SYSTEM_NAME=iOS
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DCMAKE_OSX_SYSROOT=iphonesimulator
          -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0
          -DBASL_BUILD_TESTS=OFF
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

  emscripten:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure
        run: emcmake cmake -S . -B build -DBASL_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_CROSSCOMPILING_EMULATOR=node

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  portability:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check core portability
        run: python3 scripts/check_core_portability.py

  sanitizers:
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DBASL_BUILD_TESTS=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_C_FLAGS_DEBUG=-fsanitize=address,undefined\ -fno-omit-frame-pointer
          -DCMAKE_CXX_FLAGS_DEBUG=-fsanitize=address,undefined\ -fno-omit-frame-pointer
          -DCMAKE_EXE_LINKER_FLAGS_DEBUG=-fsanitize=address,undefined
          -DCMAKE_SHARED_LINKER_FLAGS_DEBUG=-fsanitize=address,undefined

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Debug
