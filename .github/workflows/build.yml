name: Build and Release

on:
  push:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      
      - name: Run tests
        run: make test
      
      - name: Build binary
        run: make build
      
      - name: Get version
        id: version
        run: echo "VERSION=$(./basl --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT
      
      - name: Package binary
        run: |
          mkdir -p dist
          zip dist/basl-linux-amd64-${{ steps.version.outputs.VERSION }}.zip basl
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: basl-linux-amd64
          path: dist/basl-linux-amd64-${{ steps.version.outputs.VERSION }}.zip
      
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/basl-linux-amd64-${{ steps.version.outputs.VERSION }}.zip
