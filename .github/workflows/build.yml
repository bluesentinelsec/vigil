name: Build

on:
  push:
  workflow_dispatch:

jobs:
  native-full:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DVIGIL_BUILD_TESTS=ON
          -DVIGIL_STDLIB_FFI=ON
          -DVIGIL_STDLIB_FS=ON
          -DVIGIL_STDLIB_HTTP=ON
          -DVIGIL_STDLIB_NET=ON
          -DVIGIL_STDLIB_READLINE=ON
          -DVIGIL_STDLIB_THREAD=ON
          -DVIGIL_STDLIB_TIME=ON
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  native-minimal:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DVIGIL_BUILD_TESTS=ON
          -DVIGIL_STDLIB_FFI=OFF
          -DVIGIL_STDLIB_FS=OFF
          -DVIGIL_STDLIB_HTTP=OFF
          -DVIGIL_STDLIB_NET=OFF
          -DVIGIL_STDLIB_READLINE=OFF
          -DVIGIL_STDLIB_THREAD=OFF
          -DVIGIL_STDLIB_TIME=OFF
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  integration-tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies (POSIX)
        if: runner.os != 'Windows'
        run: pip install pytest pexpect

      - name: Install test dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install pytest wexpect

      - name: Configure
        run: >
          cmake -S . -B build
          -DVIGIL_BUILD_TESTS=OFF
          -DVIGIL_STDLIB_FFI=ON
          -DVIGIL_STDLIB_FS=ON
          -DVIGIL_STDLIB_HTTP=ON
          -DVIGIL_STDLIB_NET=ON
          -DVIGIL_STDLIB_READLINE=ON
          -DVIGIL_STDLIB_THREAD=ON
          -DVIGIL_STDLIB_TIME=ON
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run integration tests (POSIX)
        if: runner.os != 'Windows'
        run: VIGIL_BIN=$PWD/build/vigil pytest integration_tests/ -v

      - name: Run integration tests (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:VIGIL_BIN = "$PWD\build\Release\vigil.exe"
          pytest integration_tests/ -v

  android:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=${{ matrix.abi }}
          -DANDROID_PLATFORM=android-21
          -DVIGIL_BUILD_TESTS=OFF
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_SYSTEM_NAME=iOS
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DCMAKE_OSX_SYSROOT=iphonesimulator
          -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0
          -DVIGIL_BUILD_TESTS=OFF
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

  emscripten:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure
        run: emcmake cmake -S . -B build -DVIGIL_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

  clang-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Fetch main
        run: git fetch origin main --depth=1

      - name: Check formatting
        env:
          CLANG_FORMAT_BIN: /usr/bin/clang-format-18
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.c' '*.h')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C or header changes to format-check."
            exit 0
          fi
          scripts/run_clang_format.sh --check "${files[@]}"
  portability:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check core portability
        run: python3 scripts/check_core_portability.py

      - name: Check stdlib portability
        run: python3 scripts/check_stdlib_portability.py

  valgrind:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Configure
        run: >
          cmake -S . -B build
          -DVIGIL_BUILD_TESTS=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS_DEBUG="-g -O0 -Wno-format-truncation"

      - name: Build
        run: cmake --build build --config Debug

      - name: Run tests under valgrind
        run: >
          valgrind
          --leak-check=full
          --show-leak-kinds=definite,indirect
          --track-origins=yes
          --num-callers=30
          --error-exitcode=1
          ./build/vigil_tests

  sanitizers:
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DVIGIL_BUILD_TESTS=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_C_FLAGS_DEBUG=-fsanitize=address,undefined\ -fno-omit-frame-pointer
          -DCMAKE_CXX_FLAGS_DEBUG=-fsanitize=address,undefined\ -fno-omit-frame-pointer
          -DCMAKE_EXE_LINKER_FLAGS_DEBUG=-fsanitize=address,undefined
          -DCMAKE_SHARED_LINKER_FLAGS_DEBUG=-fsanitize=address,undefined

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Debug
