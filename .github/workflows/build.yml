name: Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -DBASL_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  emscripten:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure
        run: emcmake cmake -S . -B build -DBASL_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_CROSSCOMPILING_EMULATOR=node

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  valgrind:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install --yes valgrind

      - name: Configure
        run: >
          cmake -S . -B build
          -DBASL_BUILD_TESTS=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCTEST_MEMORYCHECK_COMMAND=valgrind
          -DCTEST_MEMORYCHECK_COMMAND_OPTIONS=--leak-check=full\ --show-leak-kinds=all\ --track-origins=yes\ --error-exitcode=1

      - name: Build
        run: cmake --build build --config Debug

      - name: Memcheck
        run: ctest --test-dir build -T memcheck --output-on-failure -C Debug
