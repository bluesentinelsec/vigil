name: Build

on:
  push:
  workflow_dispatch:

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -DBASL_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  emscripten:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure
        run: emcmake cmake -S . -B build -DBASL_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_CROSSCOMPILING_EMULATOR=node

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DBASL_BUILD_TESTS=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_C_FLAGS_DEBUG=-fsanitize=address,undefined\ -fno-omit-frame-pointer
          -DCMAKE_CXX_FLAGS_DEBUG=-fsanitize=address,undefined\ -fno-omit-frame-pointer
          -DCMAKE_EXE_LINKER_FLAGS_DEBUG=-fsanitize=address,undefined
          -DCMAKE_SHARED_LINKER_FLAGS_DEBUG=-fsanitize=address,undefined

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Debug
