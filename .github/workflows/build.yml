name: Build

on:
  push:
  workflow_dispatch:

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -DBASL_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  android:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            run_tests: false
          - abi: x86_64
            run_tests: true

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=${{ matrix.abi }}
          -DANDROID_PLATFORM=android-21
          -DBASL_BUILD_TESTS=${{ matrix.run_tests && 'ON' || 'OFF' }}
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test (emulator)
        if: matrix.run_tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          script: |
            adb push build/basl_tests /data/local/tmp/basl_tests
            adb shell chmod +x /data/local/tmp/basl_tests
            adb shell /data/local/tmp/basl_tests

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure (Simulator, universal binary)
        run: >
          cmake -S . -B build -G Xcode
          -DCMAKE_SYSTEM_NAME=iOS
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0
          -DBASL_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release -- -sdk iphonesimulator

      - name: Test (Simulator)
        run: |
          RUNTIME=$(xcrun simctl list runtimes iOS available -j | python3 -c "import sys,json; rts=json.load(sys.stdin)['runtimes']; print(rts[-1]['identifier'])")
          UDID=$(xcrun simctl create basl_test "iPhone 16" "$RUNTIME")
          xcrun simctl boot "$UDID"
          xcrun simctl spawn "$UDID" build/Release-iphonesimulator/basl_tests
          xcrun simctl shutdown "$UDID"
          xcrun simctl delete "$UDID"

  emscripten:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure
        run: emcmake cmake -S . -B build -DBASL_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_CROSSCOMPILING_EMULATOR=node

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  portability:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check core portability
        run: python3 scripts/check_core_portability.py

  sanitizers:
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DBASL_BUILD_TESTS=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_C_FLAGS_DEBUG=-fsanitize=address,undefined\ -fno-omit-frame-pointer
          -DCMAKE_CXX_FLAGS_DEBUG=-fsanitize=address,undefined\ -fno-omit-frame-pointer
          -DCMAKE_EXE_LINKER_FLAGS_DEBUG=-fsanitize=address,undefined
          -DCMAKE_SHARED_LINKER_FLAGS_DEBUG=-fsanitize=address,undefined

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Debug
