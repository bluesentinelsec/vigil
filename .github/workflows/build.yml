name: Build and Release

on:
  push:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      
      - name: Install Python dependencies
        run: pip install pexpect
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential \
            libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev
      
      - name: Run tests
        run: make test
      
      - name: Build binary
        run: make build
      
      - name: Get version
        id: version
        run: echo "VERSION=$(./basl --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT
      
      - name: Package binary
        run: |
          zip basl-linux-amd64-${{ steps.version.outputs.VERSION }}.zip basl
      
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: basl-linux-amd64-${{ steps.version.outputs.VERSION }}
          path: basl-linux-amd64-${{ steps.version.outputs.VERSION }}.zip
      
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: basl-linux-amd64-${{ steps.version.outputs.VERSION }}.zip
